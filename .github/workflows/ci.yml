name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'ci-approved')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ZIG_GLOBAL_CACHE_DIR: /tmp/zig-global-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfribidi-dev libicu-dev

      - name: Build
        run: zig build

      - name: Unit + filtered conformance
        run: zig build test -Doptimize=ReleaseSafe -j1

      - name: Differential smoke (non-blocking mismatch mode)
        run: ITIJAH_DIFF_CASES_PER_PROFILE=2 ITIJAH_DIFF_MAX_REPORTED=12 zig build test-diff
